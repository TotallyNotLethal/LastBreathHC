defaultZone:
  world: world
  x: 0.0
  y: 64.0
  z: 0.0
  radius: 300.0

# If true, task progress only counts inside the configured zone.
# Can be overridden per holiday with `restrictCollectionToZone`.
defaultRestrictCollectionToZone: true

# CUSTOM_ITEM inflation tuning defaults (Option B: weighted pools):
# - Use the same `pool` for mutually exclusive CUSTOM_ITEM rewards.
# - Keep `chance` conservative for rare pools (recommended 0.01-0.03 for high-impact items).
# - Start with fallback:item weights around 6-10 and chase:item weights around 1-2.
# - Example ratio 8:2:1 ~= 72.7% / 18.2% / 9.1% split after the pool chance succeeds.
# - Set weight >= 1. `pool` and `weight` are ignored for non-CUSTOM_ITEM reward types.

holidays:
  new_year:
    eventName: "Midnight Meteor Relay"
    objective: "Defend the countdown by hunting phantoms, collecting gunpowder, and crafting signal stars."
    restrictCollectionToZone: false
    tasks:
      - type: KILL_ENTITY
        target: PHANTOM
        amount: 24
      - type: COLLECT_ITEM
        target: GUNPOWDER
        amount: 128
      - type: COLLECT_ITEM
        target: FIREWORK_STAR
        amount: 16
    rewards:
      - type: ITEM
        target: FIREWORK_ROCKET
        amount: 128
      - type: ITEM
        target: NETHER_STAR
        amount: 1
      - type: CUSTOM_ITEM
        target: cosmetic_bow_trail_starfall
        amount: 1
      - type: XP
        amount: 950

