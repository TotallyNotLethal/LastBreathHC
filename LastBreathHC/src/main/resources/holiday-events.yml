defaultZone:
  world: world
  x: 0.0
  y: 64.0
  z: 0.0
  radius: 300.0

# CUSTOM_ITEM inflation tuning defaults (Option B: weighted pools):
# - Use the same `pool` for mutually exclusive CUSTOM_ITEM rewards.
# - Keep `chance` conservative for rare pools (recommended 0.01-0.03 for high-impact items).
# - Start with fallback:item weights around 6-10 and chase:item weights around 1-2.
# - Example ratio 8:2:1 ~= 72.7% / 18.2% / 9.1% split after the pool chance succeeds.
# - Set weight >= 1. `pool` and `weight` are ignored for non-CUSTOM_ITEM reward types.

holidays:
  new_year:
    eventName: "Midnight Meteor Relay"
    objective: "Hunt phantoms and collect gunpowder in the holiday zone."
    tasks:
      - type: KILL_ENTITY
        target: PHANTOM
        amount: 10
      - type: COLLECT_ITEM
        target: GUNPOWDER
        amount: 64
    rewards:
      - type: ITEM
        target: FIREWORK_ROCKET
        amount: 64
      - type: XP
        amount: 500

  valentines:
    eventName: "Cupid's Lost Letters"
    objective: "Collect roses and cocoa beans in the holiday zone."
    tasks:
      - type: BREAK_BLOCK
        target: ROSE_BUSH
        amount: 24
      - type: COLLECT_ITEM
        target: COCOA_BEANS
        amount: 32
    rewards:
      - type: ITEM
        target: GOLDEN_APPLE
        amount: 8
      - type: XP
        amount: 400

  st_patricks:
    eventName: "Emerald Gremlin Hunt"
    objective: "Kill cave spiders and gather emeralds from the event zone."
    tasks:
      - type: KILL_ENTITY
        target: CAVE_SPIDER
        amount: 20
      - type: COLLECT_ITEM
        target: EMERALD
        amount: 16
    rewards:
      - type: ITEM
        target: EMERALD
        amount: 24
      - type: XP
        amount: 450

  easter:
    eventName: "Colossal Bunny Rampage"
    objective: "Defeat giant bunnies (rabbits) and gather eggs for the Spring Totem."
    tasks:
      - type: KILL_ENTITY
        target: RABBIT
        amount: 30
      - type: COLLECT_ITEM
        target: EGG
        amount: 64
    rewards:
      - type: CUSTOM_ITEM
        target: enhanced_grindstone
        amount: 1
        chance: 0.10
        pool: spring_relics
        weight: 7
      - type: CUSTOM_ITEM
        target: totem_of_life
        amount: 1
        chance: 0.10
        pool: spring_relics
        weight: 2
      - type: XP
        amount: 700

  independence_day:
    eventName: "Powder Keg Convoy"
    objective: "Collect TNT and gunpowder while defending the holiday zone."
    tasks:
      - type: COLLECT_ITEM
        target: GUNPOWDER
        amount: 64
      - type: COLLECT_ITEM
        target: TNT
        amount: 16
    rewards:
      - type: ITEM
        target: TNT
        amount: 16
      - type: ITEM
        target: FIREWORK_ROCKET
        amount: 64

  halloween:
    eventName: "Lanterns of the Hollow"
    objective: "Eliminate undead and carve pumpkins in the holiday zone."
    tasks:
      - type: KILL_ENTITY
        target: ZOMBIE
        amount: 35
      - type: BREAK_BLOCK
        target: PUMPKIN
        amount: 20
    rewards:
      - type: ITEM
        target: JACK_O_LANTERN
        amount: 16
      - type: CUSTOM_ITEM
        target: enhanced_grindstone
        amount: 1
        chance: 0.02
        pool: spooky_relics
        weight: 8
      - type: CUSTOM_ITEM
        target: rebirth_stone
        amount: 1
        chance: 0.02
        pool: spooky_relics
        weight: 1
      - type: XP
        amount: 600

  thanksgiving:
    eventName: "Harvest Guardian Feast"
    objective: "Gather harvest crops from the event area."
    tasks:
      - type: COLLECT_ITEM
        target: WHEAT
        amount: 64
      - type: COLLECT_ITEM
        target: CARROT
        amount: 64
      - type: COLLECT_ITEM
        target: POTATO
        amount: 64
    rewards:
      - type: ITEM
        target: GOLDEN_CARROT
        amount: 24
      - type: ITEM
        target: BREAD
        amount: 24
      - type: ITEM
        target: COOKED_BEEF
        amount: 8
      - type: CUSTOM_ITEM
        target: enhanced_grindstone
        amount: 1
        chance: 0.05
        pool: harvest_relics
        weight: 6
      - type: CUSTOM_ITEM
        target: gracestone
        amount: 1
        chance: 0.05
        pool: harvest_relics
        weight: 3
      - type: XP
        amount: 450

  christmas:
    eventName: "Snowman Salvage Operation"
    objective: "Recover snowman parts by collecting snow blocks and killing strays."
    tasks:
      - type: COLLECT_ITEM
        target: SNOW_BLOCK
        amount: 64
      - type: KILL_ENTITY
        target: STRAY
        amount: 20
    rewards:
      - type: ITEM
        target: DIAMOND
        amount: 4
      - type: CUSTOM_ITEM
        target: enhanced_grindstone
        amount: 1
        chance: 0.02
        pool: winter_relics
        weight: 7
      - type: CUSTOM_ITEM
        target: rebirth_stone
        amount: 1
        chance: 0.02
        pool: winter_relics
        weight: 1
      - type: XP
        amount: 650
