choices:
  positive:
    rally_1:
      line: "Warband, with {player} we raise stronger walls tonight."
      action: UNITY
      weight: 3.5
    fortify_1:
      line: "Good. We fortify the huts and watchtowers together."
      action: FORTIFY
      weight: 2.0
    stand_down_1:
      line: "I will spare your people for now, {player}."
      action: STAND_DOWN
      weight: 1.2
  neutral:
    regroup_1:
      line: "Keep your distance, {player}. We build and we march."
      action: UNITY
      weight: 2.5
    pressure_1:
      line: "You can watch us build, but don't test our patience."
      action: AGGRESSION
      weight: 1.4
    oath_1:
      line: "No feud today. We have a settlement to raise."
      action: FORTIFY
      weight: 1.8
  negative:
    betrayal_1:
      line: "You speak weakness. Someone in this warband will bleed for it."
      action: BETRAYAL
      weight: 2.2
    feud_1:
      line: "Blood feud! Your name is carved into our hate, {player}."
      action: BLOOD_FEUD
      weight: 2.0
    aggression_1:
      line: "Enough talk. We strike first and build over the ashes."
      action: AGGRESSION
      weight: 2.8

npcConversations:
  captain_to_captain:
    ctc_1:
      line: "{listener}, finish your hut line before nightfall."
      weight: 2.5
    ctc_2:
      line: "We march together, {listener}; no stragglers."
      weight: 1.7
  captain_to_warchief:
    ctw_1:
      line: "Warchief {listener}, our huts are secured and ready."
      weight: 2.2
    ctw_2:
      line: "Command us, {listener}; we hold this edge."
      weight: 1.3
  captain_to_overlord:
    cto_1:
      line: "Overlord {listener}, the outer ring is fortified."
      weight: 1.8
  warchief_to_captain:
    wtc_1:
      line: "Captain {listener}, anchor your huts around my banner."
      weight: 2.8
    wtc_2:
      line: "Captain {listener}, keep your warband in formation."
      weight: 1.6
  warchief_to_warchief:
    wtw_1:
      line: "{listener}, merge your crews; this settlement rises tonight."
      weight: 2.0
  warchief_to_overlord:
    wto_1:
      line: "Overlord {listener}, the settlement streets are under our control."
      weight: 2.1
  overlord_to_captain:
    otc_1:
      line: "Captain {listener}, push your huts outward and secure the flanks."
      weight: 2.6
  overlord_to_warchief:
    otw_1:
      line: "Warchief {listener}, expand the district and man every gate."
      weight: 2.7
    otw_2:
      line: "Warchief {listener}, no infighting until the stronghold stands."
      weight: 1.5
  overlord_to_overlord:
    oto_1:
      line: "{listener}, our strongholds will lock this region in iron."
      weight: 1.9

eventConversations:
  betrayal:
    betrayal_1:
      line: "{listener}, your oath is dust. I claim your warband now."
      weight: 2.4
    betrayal_2:
      line: "No more brothers, {listener}. Only rivals."
      weight: 1.6
  blood_brother_avenge:
    avenge_1:
      line: "{listener}, you killed {fallen}. I take your head for it!"
      weight: 2.8
    avenge_2:
      line: "For {fallen}! Your blood pays this debt, {listener}."
      weight: 2.1
    avenge_3:
      line: "You ended {fallen}; now I end you."
      weight: 1.7

  warband_feud:
    feud_1:
      line: "{speaker} and {listener}, settle it in the pit, then return to the line."
      weight: 2.0
    feud_2:
      line: "Steel first, grudges second. {listener}, you feud for the army now."
      weight: 1.5
  fight_pit:
    pit_1:
      line: "Fight pit at dusk. {listener}, entertain the ranks and sharpen their rage."
      weight: 2.1
    pit_2:
      line: "No idle hands—pit duel now, then back to the warpath."
      weight: 1.7
