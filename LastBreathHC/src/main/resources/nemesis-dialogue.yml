choices:
  positive:
    positive_01:
      line: '{captain} says, "Careful, {player}. Walk away and you might keep your head."'
      action: UNITY
      weight: 1.45
    positive_02:
      line: '{captain} snarls, "You are prey, {player}, but I might let you run."'
      action: FORTIFY
      weight: 1.9
    positive_03:
      line: '{captain} says, "Drop your weapon, {player}. I am in a merciful mood."'
      action: STAND_DOWN
      weight: 2.35
    positive_04:
      line: '{captain} growls, "Do not test me, {player}. One more step and I charge."'
      action: UNITY
      weight: 2.8
    positive_05:
      line: '{captain} says, "You are marked, {player}, but I will give you one warning."'
      action: FORTIFY
      weight: 1.0
    positive_06:
      line: '{captain} says, "Leave this ground, {player}, before my warband stops playing nice."'
      action: STAND_DOWN
      weight: 1.45
    positive_07:
      line: '{captain} hisses, "You are still my enemy, {player}. I simply choose patience."'
      action: UNITY
      weight: 1.9
    positive_08:
      line: '{captain} says, "Turn around now, {player}. I would rather hunt you later."'
      action: FORTIFY
      weight: 2.35
    positive_09:
      line: '{captain} growls, "I can end this now, {player}. Do not make me prove it."'
      action: STAND_DOWN
      weight: 2.8
    positive_10:
      line: '{captain} says, "You are not a friend, {player}. Consider this your final warning."'
      action: UNITY
      weight: 1.0
    positive_11:
      line: '{captain} says, "Back off, {player}. Mercy is expensive and mine is almost gone."'
      action: FORTIFY
      weight: 1.45
    positive_12:
      line: '{captain} snarls, "Run while you can, {player}; next time I won''t speak first."'
      action: STAND_DOWN
      weight: 1.9
  neutral:
    neutral_01:
      line: '{captain} says, "Keep your distance, {player}. I have not chosen violence yet."'
      action: UNITY
      weight: 1.45
    neutral_02:
      line: '{captain} growls, "You are in my hunting grounds, {player}. Tread lightly."'
      action: FORTIFY
      weight: 1.9
    neutral_03:
      line: '{captain} says, "Another step, {player}, and this turns into blood."'
      action: AGGRESSION
      weight: 2.35
    neutral_04:
      line: '{captain} mutters, "Not yet... but I am watching you, {player}."'
      action: STAND_DOWN
      weight: 2.8
    neutral_05:
      line: '{captain} says, "Do not mistake silence for peace, {player}."'
      action: UNITY
      weight: 1.0
    neutral_06:
      line: '{captain} says, "I can hear your heartbeat, {player}. That should worry you."'
      action: FORTIFY
      weight: 1.45
    neutral_07:
      line: '{captain} says, "You look nervous, {player}. Good. Stay that way."'
      action: AGGRESSION
      weight: 1.9
    neutral_08:
      line: '{captain} says, "You are still the enemy, {player}. I am just waiting for a cleaner kill."'
      action: STAND_DOWN
      weight: 2.35
    neutral_09:
      line: '{captain} growls, "Leave now, {player}, or feed the crows."'
      action: UNITY
      weight: 2.8
    neutral_10:
      line: '{captain} says, "I warned you once, {player}. I rarely repeat myself."'
      action: FORTIFY
      weight: 1.0
    neutral_11:
      line: '{captain} says, "My warband wants your head, {player}. I have not said no."'
      action: AGGRESSION
      weight: 1.45
    neutral_12:
      line: '{captain} hisses, "Keep moving, {player}. Standing still makes this too easy."'
      action: STAND_DOWN
      weight: 1.9
  negative:
    negative_01:
      line: '{captain} roars, "There you are, {player}. Tear them apart!"'
      action: BETRAYAL
      weight: 1.45
    negative_02:
      line: '{captain} snarls, "No warnings now, {player}. I am taking your life."'
      action: BLOOD_FEUD
      weight: 1.9
    negative_03:
      line: '{captain} says, "{player}, bleed for every insult you gave my warband."'
      action: AGGRESSION
      weight: 2.35
    negative_04:
      line: '{captain} growls, "Close in! {player} dies here."'
      action: BETRAYAL
      weight: 2.8
    negative_05:
      line: '{captain} roars, "I warned you, {player}. Now you pay."'
      action: BLOOD_FEUD
      weight: 1.0
    negative_06:
      line: '{captain} shouts, "Warband, crush {player} before they can run!"'
      action: AGGRESSION
      weight: 1.45
    negative_07:
      line: '{captain} snarls, "Break {player}''s legs. I want them alive for a minute."'
      action: BETRAYAL
      weight: 1.9
    negative_08:
      line: '{captain} says, "{player}, I am done talking. Draw steel."'
      action: BLOOD_FEUD
      weight: 2.35
    negative_09:
      line: '{captain} roars, "Drive {player} into the dirt and do not stop."'
      action: AGGRESSION
      weight: 2.8
    negative_10:
      line: '{captain} hisses, "You should have fled, {player}."'
      action: BETRAYAL
      weight: 1.0
    negative_11:
      line: '{captain} growls, "Every captain here wants your death, {player}."'
      action: BLOOD_FEUD
      weight: 1.45
    negative_12:
      line: '{captain} roars, "No mercy! Carve {player} out of this battlefield!"'
      action: AGGRESSION
      weight: 1.9
npcConversations:
  captain_to_captain:
    captain_to_captain_01:
      line: '{speaker} says, "{listener}, take the left flank and keep formation tight."'
      weight: 1.45
    captain_to_captain_02:
      line: '{speaker} barks, "{listener}, hold the choke point—no one gets through."'
      weight: 1.8
      action: FORTIFY
      reply:
        line: '{listener} answers, "Understood, {speaker}. My line is locking in now."'
        weight: 1.0
        action: UNITY
    captain_to_captain_03:
      line: '{speaker} says, "{listener}, push the ridge and call out every contact."'
      weight: 2.15
    captain_to_captain_04:
      line: '{speaker} growls, "{listener}, rotate your squad and keep pressure on them."'
      weight: 2.5
      action: UNITY
      reply:
        line: '{listener} replies, "Got it, {speaker}. We''re moving and holding discipline."'
        weight: 1.0
        action: STAND_DOWN
    captain_to_captain_05:
      line: '{speaker} says, "{listener}, regroup at the banner; we strike together."'
      weight: 2.85
      followUps:
        follow_1:
          line: 'A scout reports, "The flank is holding, and their push is slowing."'
          weight: 1.4
          action: FORTIFY
        follow_2:
          line: 'War drums thunder—both crews pull back toward the banner.'
          weight: 1.0
          reply:
            line: '{listener} says, "We''re set, {speaker}. Just give the word."'
            weight: 1.0
